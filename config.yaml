# ==========================================
# CONFIGURACIÓN DEL REPORTE ESTRATÉGICO 
# “MÓDULO 01 — config.yaml”
# ==========================================

tiempo:
  anio_analisis: 2024         # Año principal (Current Year)
  anio_objetivo: 2025         # Año meta/proyección
  anio_previo: 2023           # Año anterior (para comparación YoY)
  anio_historico_inicio: 2022 # Inicio de las series de tiempo

rutas:
  # Carpeta donde se depositan los Excels nuevos cada mes
  archivo_entrada: "datos_entrada"
  carpeta_salida: "salidas_viz_final"
  nombre_pdf_prefijo: "Reporte_Estrategico_INFONAVIT"

metricas:
  col_monto: "Monto de crédito Infonavit"
  col_num: "Número de créditos formalizados"

# --------------------------------------------------
# ESTILOS — SOLO PALETA CORPORATIVA (sin rojo alarma)
# --------------------------------------------------
estilos:
  color_positivo: "#235B4E"        # Verde institucional (crecimiento / favorable)
  color_negativo: "#9F2241"        # Guinda corporativo (caída / ajuste)
  color_neutro: "#6F7271"          # Gris institucional
  color_corporativo: "#691C32"     # Vino Infonavit (primario)

  # (opcionales para escalabilidad visual futura)
  color_secundario: "#10312B"      # Verde profundo
  color_acento: "#BC955C"          # Dorado institucional
  color_fondo_suave: "#DDC9A3"     # Beige institucional
  color_texto_suave: "#98989A"     # Gris claro

